name: Refresh Calendar Cache

on:
  schedule:
    # 8am BKK (UTC+7) = 1am UTC
    - cron: '0 1 * * 1-5'
    # 12pm BKK = 5am UTC
    - cron: '0 5 * * 1-5'
    # 4pm BKK = 9am UTC
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run calendar refresh
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python refresh.py --mode calendar

      - name: Commit calendar cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar_cache.json
          git diff --cached --quiet || git commit -m "chore: update calendar cache [skip ci]"
          git pull --rebase origin main
          git push
