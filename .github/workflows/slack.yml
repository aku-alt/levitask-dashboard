name: Refresh Dashboard (Calendar + Slack → API)

on:
  schedule:
    # Every 15 min, 9am-7pm BKK (UTC+7) = 2am-12pm UTC, weekdays
    - cron: '*/15 2-12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh calendar cache
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python refresh.py --mode calendar

      - name: Push availability to dashboard API
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DASH_PUSH_TOKEN: ${{ secrets.DASH_PUSH_TOKEN }}
        run: python refresh.py --mode slack
